<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="10" fill="#0f0f0f"/>

  <!-- Letter A — elegant serif style -->
  <text
    x="32"
    y="46"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="44"
    font-weight="700"
    letter-spacing="-1"
    fill="#C8A96E"
  >A</text>

  <!-- Thin gold underline accent -->
  <line x1="14" y1="54" x2="50" y2="54" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
